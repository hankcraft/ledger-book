<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background: rounded square with brand gradient -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Upward trend line (investment performance) -->
  <polyline
    points="12,44 24,38 34,42 44,30 52,20"
    fill="none"
    stroke="#fff"
    stroke-width="4"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.9"
  />
  <!-- Sparkle (搭檔 AI companion) -->
  <path
    d="M48,16 L49.5,20 L53,21 L49.5,22.5 L48,26 L46.5,22.5 L43,21 L46.5,20 Z"
    fill="#fbbf24"
  />
  <!-- Small sparkle -->
  <path
    d="M20,22 L21,24 L23,24.5 L21,25.5 L20,27.5 L19,25.5 L17,24.5 L19,24 Z"
    fill="#fbbf24"
    opacity="0.7"
  />
</svg>
